name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # The repository intentionally does not require a checked-in Gradle wrapper.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Verify AVI conversion on Android
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          emulator-boot-timeout: 600
          script: gradle :app:connectedDebugAndroidTest --no-daemon

      - name: Name APK
        run: cp app/build/outputs/apk/debug/app-debug.apk KyroAviMp4.apk

      - name: Publish direct APK download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: KyroAviMp4
          prerelease: true
          files: KyroAviMp4.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KyroAviMp4-debug-apk
          path: KyroAviMp4.apk
          if-no-files-found: error
          retention-days: 30
